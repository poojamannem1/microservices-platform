version: "3.9"

services:

  user-service:
    build: ./services/user-service
    container_name: user-service
    env_file: .env
    depends_on:
      - postgres
    networks:
      - backend

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    env_file: .env
    networks:
      - backend

  order-service:
    build: ./services/order-service
    container_name: order-service
    env_file: .env
    networks:
      - backend

  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - auth-service
      - order-service
    networks:
      - backend

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    networks:
      - backend

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"

networks:
  backend:

volumes:
  pgdata: