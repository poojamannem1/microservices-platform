global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8000"]

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:8000"]